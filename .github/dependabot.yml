# Dependabot configuration for the ML4T companion repository.
#
# This repo is an educational companion to the book — readers clone it and run
# notebooks locally; it is not a deployed service. The dependency lock is
# canonical in the private code repo and mirrored here, so a Dependabot PR
# against this mirror would fork the lock and be overwritten on the next sync.
#
# Policy: ALERTS-ONLY. We keep Dependabot *alerts* enabled (the Security tab
# surfaces new advisories so we can batch-refresh canonically), but we do NOT
# let Dependabot open PRs against this mirror:
#   - Automated security-update PRs are disabled at the repository level
#     (Settings → Code security → Dependabot security updates = off). That
#     toggle — not this file — is what previously generated the recurring
#     grouped security PRs; a repo config file cannot suppress them.
#   - open-pull-requests-limit: 0 additionally disables routine version-bump PRs.
# Dependency updates are reviewed and batched in the canonical code repo, then
# the lock is mirrored here — never merged piecemeal on this mirror.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
